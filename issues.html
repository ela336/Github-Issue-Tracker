<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
       <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>



<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
* {
  font-family: "Geist", sans-serif;
  font-style: normal;
}
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>
<body class="bg-[#f9f9fb]">
   <header class="bg-white ">
     <div class=" w-[90%]navbar  border-b border-base-300 flex  justify-between items-center px-9 py-4">
  <div class="flex items-center ">
    <img src="./assets/github-logo.png" class="h-9 w-9">
    <a class="btn btn-ghost text-xl"><h3>GitHub Issues Tracker</h3></a>
  </div>
  <div class="flex gap-2">
    <input  id="search-input" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
    <button class="btn btn-primary" onclick="searchIssues()"><i class="fa-solid fa-plus"></i> New Issue</button>
  </div>
</div>
   </header>



   <main>
    <div class="bg-white container shadow mx-auto my-9 py-5 px-3 rounded-box">
        <div class="space-x-2">
            <button id="allbtn" onclick="toggleMenu(allbtn);allIssues()" class="btn btn-primary w-[120px]">All</button>
            <button id="openbtn" onclick="toggleMenu(openbtn); func('open')" class="btn btn-outline border-[#adb5c2]  w-[120px]">Open</button>
            <button id="closedbtn" onclick="toggleMenu(closedbtn);func('closed')" class="btn btn-outline border-[#adb5c2]  w-[120px]">Closed</button>
        </div>
    </div>


<!-- Issue Summary -->
    <div class="shadow-xl container mx-auto">
        <div class="bg-white container shadow mx-auto my-9 py-4 px-3 flex items-center justify-between border-b border-base-300 ">
        <div class="flex items-center gap-4">
            <div class="bg-[#ECE4FF] h-[50px] w-[50px] rounded-[100%] flex items-center justify-center">
                <img src="./assets/Aperture.png" alt="">
            </div>
            <div>
                <h3 class="text-[20px] font-semibold" id="issuecount">50 Issues</h3>
                <p class="text-[#64748B] text-[16px] font-normal">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex gap-4  ">
            <div class="flex items-center gap-2"><div class="bg-[#00A96E] h-[15px] w-[15px] rounded-[100%]"></div>
            <p>Open</p>
            </div>
            <div class="flex items-center gap-2">
                <div class="bg-[#A855F7] h-[15px] w-[15px] rounded-[100%]"></div>
                <p>Closed</p>
            </div>
        </div>
    </div>



    <!-- cart section  -->

    <div class="bg-[#FBFBFB] conatiner mx-auto p-4">
        <div class=" grid grid-cols-4 gap-4" id="issue-container">
            <!-- cart content -->
            <!-- cards will append dynamically -->

             

              

             
        </div>
    </div>
    </div>


    

    
   </main>



   <script src="./scripts/issues.js"></script>
</body>
</html>
